# 20: Backend API service and Deployment.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: shopwave
  labels:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 5000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shopwave
  labels:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: shopwave
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shopwave
        app.kubernetes.io/component: backend
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ecommerce-web-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: shopwave-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: shopwave-config
                  key: PORT
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: shopwave-config
                  key: MONGO_URI
            - name: JWT_EXPIRE
              valueFrom:
                configMapKeyRef:
                  name: shopwave-config
                  key: JWT_EXPIRE
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: shopwave-secret
                  key: JWT_SECRET
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
