# 10: MongoDB database with persistent storage and health checks.
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: shopwave
  labels:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/component: database
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: shopwave
  labels:
    app.kubernetes.io/name: shopwave
    app.kubernetes.io/component: database
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shopwave
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shopwave
        app.kubernetes.io/component: database
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: mongo
          image: mongo:7
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: shopwave-config
                  key: MONGO_INITDB_DATABASE
          startupProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand('ping').ok
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand('ping').ok
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand('ping').ok
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
